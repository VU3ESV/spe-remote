serial:
  port: /dev/serial/by-id/usb-FTDI_FT232R_USB_UART_AI040V80-if00-port0
  baudrate: 115200
  timeout: 1.0

server:
  port: 8888
  host: "0.0.0.0"

polling:
  tx_interval: 0.2           # seconds between polls during TX/Operate
  idle_interval: 1.0         # seconds between polls when idle (RX + Standby)
  heartbeat: 15              # seconds before forcing a state push even if unchanged
  presence_heartbeat: 5      # seconds between presence heartbeat msgs
                             # ({heartbeat:true, serial:'up'|'down', ts, clients}).
                             # Lets clients detect amp-off transitions and prevents
                             # idle-WS reconnect loops in clients with their own
                             # heartbeat-watchdogs (e.g. MacExpert).
  amp_alive_threshold: 3     # max age (s) of the most recent amp frame (CSV
                             # state OR RCU display) for the heartbeat to
                             # report serial:'up'. Detects amp power-off when
                             # the FTDI cable stays connected to the Pi (FTDI
                             # USB-powered → link stays open even when the
                             # amp's CPU is dead). RCU is included because
                             # STANDBY slows CSV below the threshold while
                             # RCU OFF→ON ticks every 0.5 s keep frames flowing.

amp:
  # Must match the unit selected on the SPE front-panel setup menu —
  # the protocol returns temperatures unit-less, so the server has to be
  # told which unit they're in. Web client uses this to render °C / °F
  # and to scale the temperature gauge.
  temperature_unit: C    # C or F

# Optional FlexRadio 6000-series control for orchestrated TUNE + band
# sweep. Leave enabled: false to run spe-remote exactly as before.
# When enabled, spe-remote opens a second connection (SmartSDR TCP API)
# and exposes the tune_single / tune_band / tune_stop WS commands. See
# README "Orchestrated TUNE and Band Sweep" for the full flow.
flex:
  enabled: true
  host: "192.168.1.148"   # Static LAN IP of the Flex; leave empty ("") to auto-discover via SmartSDR UDP broadcast on port 4992
  port: 4992              # SmartSDR TCP control port
  slice_rx: 0             # Which slice to drive during tune cycles
  tune_power_watts: 10    # Carrier power for ATU tunes; SPE wants 2-15 W

logging:
  level: INFO            # DEBUG, INFO, WARNING, ERROR
